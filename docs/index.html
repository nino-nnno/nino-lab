<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nino缂栫▼瀹為獙瀹?鈥?灏戝効缂栫▼鍚挋宸ヤ綔瀹?/title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #fdfaf3;
  --paper: #f7f2e7;
  --paper-dark: #ede5d5;
  --ink: #2d2420;
  --ink-light: #5c524b;
  --ink-muted: #968b82;
  --orange: #e8652e;
  --orange-light: #f2854b;
  --mustard: #f4b836;
  --teal: #3d8b7d;
  --berry: #c7526e;
  --sky: #6ba5c7;
  --green: #7a9e5a;
  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 28px;
  --radius-xl: 36px;
  --font-display: 'Fraunces', 'Georgia', serif;
  --font-body: 'Nunito', 'Segoe UI', sans-serif;
  --ease-smooth: cubic-bezier(0.22, 0.61, 0.36, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  line-height: 1.65;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* 鈹€鈹€鈹€ Paper Texture 鈹€鈹€鈹€ */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)' opacity='0.03'/%3E%3C/svg%3E");
}

/* 鈹€鈹€鈹€ Nav 鈹€鈹€鈹€ */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 0 24px;
  background: rgba(253,250,243,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
.nav-inner {
  max-width: 1120px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
}
.logo {
  font-family: var(--font-display);
  font-weight: 700; font-size: 1.375rem;
  color: var(--ink); text-decoration: none;
  display: flex; align-items: center; gap: 8px;
}
.logo-text {
  font-family: 'Brush Script MT', 'Lucida Handwriting', 'Georgia', cursive;
  font-size: 1.75rem;
  font-weight: 400;
  color: #e91e63;
  letter-spacing: 0.02em;
  line-height: 1;
}
.logo-sub {
  font-family: var(--font-body);
  font-size: 0.625rem;
  font-weight: 700;
  color: #ad1457;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  line-height: 1;
}
.nav-links { display: flex; gap: 28px; list-style: none; }
.nav-links a {
  color: var(--ink-light); text-decoration: none;
  font-size: 0.9375rem; font-weight: 600;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--orange); }
.nav-btn {
  font-family: var(--font-body); font-weight: 700;
  font-size: 0.875rem; padding: 10px 22px;
  border-radius: 100px;
  background: var(--orange); color: #fff;
  border: none; cursor: pointer;
  text-decoration: none;
  transition: all 0.25s var(--ease-smooth);
}
.nav-btn:hover { background: var(--orange-light); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(232,101,46,0.3); }
.nav-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--ink); padding: 4px; }

/* 鈹€鈹€鈹€ Hero 鈹€鈹€鈹€ */
.hero {
  position: relative; z-index: 1;
  padding: 140px 24px 100px;
  max-width: 1120px; margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}
.hero-tag {
  display: inline-block;
  font-weight: 700; font-size: 0.8125rem;
  color: var(--orange); letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 6px 14px;
  background: rgba(232,101,46,0.08);
  border-radius: 100px;
  margin-bottom: 24px;
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2.25rem, 5vw, 3.5rem);
  font-weight: 700; line-height: 1.12;
  letter-spacing: -0.02em;
  margin-bottom: 20px;
  color: var(--ink);
}
.hero h1 em {
  font-style: italic;
  color: var(--orange);
  position: relative;
}
.hero h1 em::after {
  content: '';
  position: absolute; bottom: 2px; left: 0; right: 0;
  height: 6px; background: rgba(244,184,54,0.4);
  border-radius: 3px; z-index: -1;
}
.hero p {
  font-size: 1.0625rem; color: var(--ink-light);
  max-width: 440px; margin-bottom: 32px;
  line-height: 1.7;
}
.hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.btn {
  font-family: var(--font-body); font-weight: 700;
  font-size: 0.9375rem; padding: 14px 28px;
  border-radius: 100px; text-decoration: none;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all 0.3s var(--ease-smooth);
  cursor: pointer; border: none;
}
.btn-fill {
  background: var(--orange); color: #fff;
  box-shadow: 0 4px 16px rgba(232,101,46,0.25);
}
.btn-fill:hover { background: var(--orange-light); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,101,46,0.35); }
.btn-line {
  background: transparent; color: var(--ink);
  border: 2px solid var(--paper-dark);
}
.btn-line:hover { border-color: var(--orange); color: var(--orange); }

/* Hero Visual */
.hero-visual {
  position: relative;
  height: 380px;
  display: flex; align-items: center; justify-content: center;
}
.hero-illustration {
  position: relative;
  width: 100%; height: 100%;
}
.hero-blob {
  position: absolute;
  border-radius: 40% 60% 55% 45% / 45% 50% 50% 55%;
  animation: blobMorph 12s ease-in-out infinite;
}
.hero-blob--lg {
  width: 280px; height: 280px;
  background: linear-gradient(135deg, #fef0e5, #fde0c8);
  top: 60px; left: 60px;
  box-shadow: 0 30px 60px rgba(232,101,46,0.1);
}
.hero-blob--sm {
  width: 160px; height: 160px;
  background: linear-gradient(135deg, #e8f4f1, #d0ebe4);
  top: 160px; left: 220px;
  box-shadow: 0 20px 40px rgba(61,139,125,0.12);
  animation-delay: -4s;
}
.hero-blob--xs {
  width: 90px; height: 90px;
  background: linear-gradient(135deg, #fef7e0, #fdf0c0);
  top: 40px; left: 280px;
  box-shadow: 0 16px 32px rgba(244,184,54,0.15);
  animation-delay: -8s;
}
@keyframes blobMorph {
  0%, 100% { border-radius: 40% 60% 55% 45% / 45% 50% 50% 55%; }
  25% { border-radius: 55% 45% 50% 50% / 52% 42% 58% 48%; }
  50% { border-radius: 48% 52% 45% 55% / 55% 45% 55% 45%; }
  75% { border-radius: 52% 48% 58% 42% / 42% 55% 45% 58%; }
}
.hero-float-cards {
  position: absolute; top: 20px; left: 140px; z-index: 2;
}
.float-card {
  background: #fff; border-radius: var(--radius-sm);
  padding: 16px 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  font-weight: 700; font-size: 0.9375rem;
  display: flex; align-items: center; gap: 10px;
  animation: floatCard 5s ease-in-out infinite;
}
.float-card:first-child { margin-bottom: 12px; animation-delay: -2s; }
@keyframes floatCard {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.float-dot {
  width: 10px; height: 10px; border-radius: 50%;
  animation: dotPulse 2s ease-in-out infinite;
}
.float-dot--orange { background: var(--orange); }
.float-dot--mustard { background: var(--mustard); }
@keyframes dotPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* 鈹€鈹€鈹€ Sections 鈹€鈹€鈹€ */
.section {
  position: relative; z-index: 1;
  padding: 72px 24px;
}
.section-header {
  text-align: center; max-width: 560px; margin: 0 auto 60px;
}
.section-eyebrow {
  font-weight: 700; font-size: 0.75rem;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--orange); margin-bottom: 12px;
}
.section-header h2 {
  font-family: var(--font-display);
  font-size: clamp(1.75rem, 3.5vw, 2.5rem);
  font-weight: 700; letter-spacing: -0.02em;
  line-height: 1.2; margin-bottom: 14px;
}
.section-header p {
  color: var(--ink-light); font-size: 1rem;
}
.container { max-width: 1080px; margin: 0 auto; }

/* 鈹€鈹€鈹€ Courses 鈹€鈹€鈹€ */
.courses-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}
.course-card {
  position: relative;
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  transition: all 0.45s var(--ease-smooth);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.course-card::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: var(--radius-lg);
  opacity: 0;
  transition: opacity 0.45s var(--ease-smooth);
  pointer-events: none; z-index: 0;
}
.course-card:nth-child(1) { background: #fef6ed; }
.course-card:nth-child(2) { background: #edf6f3; }
.course-card:nth-child(3) { background: #fdf2f5; }
.course-card:nth-child(4) { background: #eef5fa; }
.course-card:nth-child(1)::after { background: radial-gradient(circle at 50% 0%, rgba(232,101,46,0.12), transparent 70%); }
.course-card:nth-child(2)::after { background: radial-gradient(circle at 50% 0%, rgba(61,139,125,0.12), transparent 70%); }
.course-card:nth-child(3)::after { background: radial-gradient(circle at 50% 0%, rgba(199,82,110,0.12), transparent 70%); }
.course-card:nth-child(4)::after { background: radial-gradient(circle at 50% 0%, rgba(107,165,199,0.12), transparent 70%); }
.course-card:hover { transform: translateY(-8px); box-shadow: 0 24px 48px rgba(0,0,0,0.1); }
.course-card:hover::after { opacity: 1; }
.course-card > * { position: relative; z-index: 1; }
.course-age {
  display: inline-block;
  font-weight: 800; font-size: 0.75rem;
  padding: 4px 12px; border-radius: 100px;
  letter-spacing: 0.03em;
  margin-bottom: 20px;
  width: fit-content;
}
.course-card:nth-child(1) .course-age { background: rgba(232,101,46,0.15); color: var(--orange); }
.course-card:nth-child(2) .course-age { background: rgba(61,139,125,0.15); color: var(--teal); }
.course-card:nth-child(3) .course-age { background: rgba(199,82,110,0.15); color: var(--berry); }
.course-card:nth-child(4) .course-age { background: rgba(107,165,199,0.15); color: var(--sky); }
.course-card h3 {
  font-family: var(--font-display);
  font-size: 1.5rem; font-weight: 600;
  letter-spacing: -0.01em; margin-bottom: 10px;
}
.course-card p {
  color: var(--ink-light); font-size: 0.9375rem;
  line-height: 1.6; margin-bottom: 24px;
  flex: 1;
}
.course-meta {
  display: flex; gap: 16px;
  font-size: 0.8125rem; color: var(--ink-muted);
  font-weight: 600;
}

/* 鈹€鈹€鈹€ Approach 鈹€鈹€鈹€ */
.approach-section { background: var(--paper); }
.approach-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 28px;
}
.approach-item {
  text-align: center; padding: 36px 24px;
  border-radius: var(--radius-md);
  transition: all 0.45s var(--ease-smooth);
  cursor: default;
  position: relative;
  z-index: 1;
}
.approach-item::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: var(--radius-md);
  background: #fff;
  opacity: 0;
  transition: all 0.45s var(--ease-smooth);
  z-index: -1;
  box-shadow: 0 20px 48px rgba(0,0,0,0.08);
}
.approach-item:hover {
  transform: translateY(-8px) scale(1.02);
}
.approach-item:hover::before {
  opacity: 1;
}
.approach-num {
  font-family: var(--font-display);
  font-size: 3.5rem; font-weight: 700;
  color: var(--paper-dark);
  line-height: 1;
  margin-bottom: 12px;
  transition: all 0.45s var(--ease-smooth);
}
.approach-item:hover .approach-num {
  color: var(--orange);
  transform: scale(1.08);
}
.approach-item h4 {
  font-family: var(--font-display);
  font-size: 1.125rem; font-weight: 600;
  margin-bottom: 6px;
  transition: color 0.3s;
}
.approach-item p { color: var(--ink-light); font-size: 0.9375rem; line-height: 1.65; transition: color 0.3s; }
.approach-item:nth-child(2):hover .approach-num { color: var(--teal); }
.approach-item:nth-child(3):hover .approach-num { color: var(--sky); }

/* 鈹€鈹€鈹€ Projects 鈹€鈹€鈹€ */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}
.project-card {
  background: #fff;
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.05);
  transition: all 0.4s var(--ease-smooth);
  position: relative;
}
.project-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; border-radius: 0 0 3px 3px;
  background: var(--orange);
  transform: scaleX(0);
  transition: transform 0.35s var(--ease-smooth);
}
.project-card:nth-child(2)::after { background: var(--teal); }
.project-card:nth-child(3)::after { background: var(--berry); }
.project-card:nth-child(4)::after { background: var(--sky); }
.project-card:nth-child(5)::after { background: var(--mustard); }
.project-card:nth-child(6)::after { background: var(--ink-muted); }
.project-card:hover { transform: translateY(-6px); box-shadow: 0 20px 44px rgba(0,0,0,0.1); }
.project-card:hover::after { transform: scaleX(1); }
.project-preview {
  height: 140px;
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem;
}
.project-card:nth-child(1) .project-preview { background: #fef6ed; }
.project-card:nth-child(2) .project-preview { background: #edf6f3; }
.project-card:nth-child(3) .project-preview { background: #fdf2f5; }
.project-card:nth-child(4) .project-preview { background: #eef5fa; }
.project-info { padding: 18px 20px; }
.project-info h5 {
  font-family: var(--font-display);
  font-size: 1.0625rem; font-weight: 600;
  margin-bottom: 4px;
}
.project-info .project-desc {
  font-size: 0.8125rem; color: var(--ink-light);
  line-height: 1.55; margin-bottom: 8px;
}
.project-info span {
  font-size: 0.8125rem; color: var(--ink-muted);
  font-weight: 600;
}

/* 鈹€鈹€鈹€ Teachers 鈹€鈹€鈹€ */
.teachers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}
.teacher-card {
  display: flex; gap: 20px;
  background: #fff; border-radius: var(--radius-md);
  padding: 28px; border: 1px solid rgba(0,0,0,0.04);
  transition: all 0.4s var(--ease-smooth);
  position: relative; overflow: hidden;
}
.teacher-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 0 3px 3px 0;
  transform: scaleY(0);
  transition: transform 0.35s var(--ease-smooth);
}
.teacher-card:nth-child(1)::before { background: var(--orange); }
.teacher-card:nth-child(2)::before { background: var(--teal); }
.teacher-card:nth-child(3)::before { background: var(--sky); }
.teacher-card:hover::before { transform: scaleY(1); }
.teacher-card:hover { box-shadow: 0 16px 40px rgba(0,0,0,0.08); transform: translateY(-4px); }
.teacher-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
}
.teacher-card:nth-child(1) .teacher-avatar { background: #fef6ed; }
.teacher-card:nth-child(2) .teacher-avatar { background: #edf6f3; }
.teacher-card:nth-child(3) .teacher-avatar { background: #eef5fa; }
.teacher-info h4 {
  font-family: var(--font-display);
  font-size: 1.0625rem; font-weight: 600;
  margin-bottom: 2px;
}
.teacher-role { font-size: 0.8125rem; color: var(--orange); font-weight: 700; display: block; margin-bottom: 6px; }
.teacher-info p { font-size: 0.875rem; color: var(--ink-light); line-height: 1.5; }

/* 鈹€鈹€鈹€ CTA 鈹€鈹€鈹€ */
.cta-section { text-align: center; }
.cta-block {
  max-width: 600px; margin: 0 auto;
  padding: 56px 48px;
  background: #fff;
  border-radius: var(--radius-xl);
  box-shadow: 0 8px 40px rgba(0,0,0,0.04);
  border: 1px solid rgba(0,0,0,0.04);
  position: relative; overflow: hidden;
}
.cta-block::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 120px; height: 120px;
  background: rgba(244,184,54,0.2);
  border-radius: 50%;
}
.cta-block h2 {
  font-family: var(--font-display);
  font-size: 2rem; font-weight: 700;
  letter-spacing: -0.02em; margin-bottom: 12px;
  position: relative; z-index: 1;
}
.cta-block p {
  color: var(--ink-light); margin-bottom: 28px;
  position: relative; z-index: 1;
}

/* 鈹€鈹€鈹€ Footer 鈹€鈹€鈹€ */
.footer {
  position: relative; z-index: 1;
  border-top: 1px solid rgba(0,0,0,0.05);
  padding: 36px 24px; text-align: center;
}
.footer p { color: var(--ink-muted); font-size: 0.875rem; }

/* 鈹€鈹€鈹€ Doodle Divider 鈹€鈹€鈹€ */
.divider-doodle {
  text-align: center; padding: 0 24px;
  position: relative; z-index: 1;
}
.divider-doodle svg { max-width: 200px; opacity: 0.5; }

/* 鈹€鈹€鈹€ Reveal 鈹€鈹€鈹€ */
.reveal {
  opacity: 0; transform: translateY(32px);
  transition: opacity 0.7s var(--ease-smooth), transform 0.7s var(--ease-smooth);
}
.reveal.visible { opacity: 1; transform: translateY(0); }

/* 鈹€鈹€鈹€ Pricing 鈹€鈹€鈹€ */
.pricing-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}
.pricing-card {
  background: #fff; border-radius: var(--radius-md);
  padding: 28px 24px; border: 1px solid rgba(0,0,0,0.04);
  text-align: center; transition: all 0.3s var(--ease-smooth);
  position: relative;
}
.pricing-card:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.06); transform: translateY(-3px); }
.pricing-card--featured { border: 2px solid var(--orange); box-shadow: 0 8px 24px rgba(232,101,46,0.08); }
.pricing-badge {
  position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
  background: var(--orange); color: #fff;
  font-size: 0.6875rem; font-weight: 800;
  padding: 3px 14px; border-radius: 100px; letter-spacing: 0.04em; white-space: nowrap;
}
.pricing-name { font-family: var(--font-display); font-size: 1.125rem; font-weight: 600; margin-bottom: 4px; }
.pricing-age { font-size: 0.75rem; color: var(--ink-muted); font-weight: 600; margin-bottom: 16px; }
.pricing-price { font-family: var(--font-display); font-size: 2.25rem; font-weight: 700; letter-spacing: -0.02em; color: var(--orange); }
.pricing-price span { font-size: 0.875rem; font-weight: 600; color: var(--ink-muted); }
.pricing-detail { font-size: 0.8125rem; color: var(--ink-light); line-height: 1.6; margin-top: 6px; }
.pricing-note { margin-top: 36px; text-align: center; font-size: 0.875rem; color: var(--ink-muted); line-height: 1.7; }

/* 鈹€鈹€鈹€ Map 鈹€鈹€鈹€ */
.map-section { background: var(--paper); }
